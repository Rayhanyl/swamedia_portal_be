openapi: 3.0.3
info:
  title: Swamedia Portal - Auth BFF API
  description: >-
    Backend-for-Frontend facade over WSO2 Identity Server. The frontend only ever calls
    these endpoints; the Ballerina backend alone talks to WSO2 IS (URLs, client_id,
    client_secret, flowId and authorization codes never reach the frontend).
  version: "1.0.0"
servers:
  - url: http://localhost:8080
    description: Local development
tags:
  - name: Auth
    description: WSO2 IS authentication/session endpoints

paths:
  /api/v1/auth/init:
    post:
      tags: [Auth]
      summary: Start the authentication flow
      description: >-
        Wraps WSO2 IS `POST /oauth2/authorize`. Returns a flowId and the authenticators
        available for that flow. Optional — the frontend can just call `/auth/login`
        directly for the standard username/password flow.
      responses:
        "200":
          description: Flow started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/InitApiResponse"
              example:
                success: true
                message: Flow autentikasi berhasil dimulai
                data:
                  flowId: e743338d-adb3-47a9-8158-72b8f4efcaca
                  authenticators:
                    - authenticatorId: QmFzaWNBdXRoZW50aWNhdG9yOkxPQ0FM
                      authenticator: Username & Password
                      idp: LOCAL
                      metadata:
                        i18nKey: authenticator.basic
                        promptType: USER_PROMPT
                      requiredParams: [username, password]
                    - authenticatorId: R29vZ2xlT0lEQzpHb29nbGU
                      authenticator: Google
                      idp: Google
                      metadata:
                        i18nKey: authenticator.google
                errors: null
                meta:
                  timestamp: "2026-07-03T09:15:32Z"
        "500":
          description: Failed to start the flow (WSO2 IS unreachable or misconfigured)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: "2026-07-03T09:15:32Z"

  /api/v1/auth/login:
    post:
      tags: [Auth]
      summary: Log in with username and password
      description: >-
        Runs the full WSO2 IS flow server-side (init -> authenticate -> token exchange)
        and returns the token set plus the decoded id_token claims as `user`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
            example:
              username: admin
              password: "!AdminSWA123#"
      responses:
        "200":
          description: Login succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginApiResponse"
              example:
                success: true
                message: Login berhasil
                data:
                  accessToken: eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
                  refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
                  idToken: eyJhbGciOiJSUzI1NiJ9.example-id-token-payload.example-signature
                  tokenType: Bearer
                  expiresIn: 3600
                  scope: internal_login openid
                  user:
                    sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                    iss: https://iam.apicentrum.biz.id/oauth2/token
                    org_name: Super
                    exp: 1783070533
                    iat: 1783066933
                errors: null
                meta:
                  timestamp: "2026-07-03T09:15:32Z"
        "400":
          description: Malformed request body (missing/invalid JSON fields)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestBindingErrorResponse"
              example:
                timestamp: "2026-07-03T08:12:46.458339700Z"
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/login
                method: POST
        "401":
          description: Username or password incorrect
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Username atau password salah
                data: null
                errors:
                  code: UNAUTHORIZED
                  message: Username atau password salah
                  details: null
                meta:
                  timestamp: "2026-07-03T09:16:00Z"
        "500":
          description: Unexpected failure talking to WSO2 IS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: "2026-07-03T09:16:00Z"

  /api/v1/auth/token:
    post:
      tags: [Auth]
      summary: Exchange an authorization code for tokens
      description: Wraps WSO2 IS `POST /oauth2/token` using the `authorization_code` grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TokenExchangeRequest"
            example:
              code: acec171-ac3d-34e0-b4ee-fe52f2e3d94d
      responses:
        "200":
          description: Token set retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginApiResponse"
              example:
                success: true
                message: Token berhasil diambil
                data:
                  accessToken: eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
                  refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
                  idToken: eyJhbGciOiJSUzI1NiJ9.example-id-token-payload.example-signature
                  tokenType: Bearer
                  expiresIn: 3600
                  scope: internal_login openid
                  user:
                    sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                    iss: https://iam.apicentrum.biz.id/oauth2/token
                errors: null
                meta:
                  timestamp: "2026-07-03T09:17:00Z"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestBindingErrorResponse"
              example:
                timestamp: "2026-07-03T08:12:46.458339700Z"
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/token
                method: POST
        "500":
          description: Code invalid/expired or WSO2 IS unreachable
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: "2026-07-03T09:17:00Z"

  /api/v1/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh an access token
      description: Wraps WSO2 IS `POST /oauth2/token` using the `refresh_token` grant.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RefreshRequest"
            example:
              refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
      responses:
        "200":
          description: New token set issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginApiResponse"
              example:
                success: true
                message: Token berhasil diperbarui
                data:
                  accessToken: eyJhbGciOiJSUzI1NiJ9.example-refreshed-access-token.example-signature
                  refreshToken: a962fcbf-b301-3948-a29f-22202bfb5923
                  idToken: eyJhbGciOiJSUzI1NiJ9.example-refreshed-id-token.example-signature
                  tokenType: Bearer
                  expiresIn: 3600
                  scope: internal_login openid
                  user:
                    sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                    amr: [refresh_token]
                errors: null
                meta:
                  timestamp: "2026-07-03T09:18:00Z"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestBindingErrorResponse"
              example:
                timestamp: "2026-07-03T08:12:46.458339700Z"
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/refresh
                method: POST
        "401":
          description: Refresh token invalid or expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Refresh token tidak valid atau sudah expired
                data: null
                errors:
                  code: UNAUTHORIZED
                  message: Refresh token tidak valid atau sudah expired
                  details: null
                meta:
                  timestamp: "2026-07-03T09:18:00Z"
        "500":
          description: Unexpected failure talking to WSO2 IS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: "2026-07-03T09:18:00Z"

  /api/v1/auth/userinfo:
    get:
      tags: [Auth]
      summary: Get the authenticated user's claims
      description: Wraps WSO2 IS `GET /oauth2/userinfo`.
      parameters:
        - name: Authorization
          in: header
          required: true
          description: Bearer access token obtained from `/auth/login`, `/token` or `/refresh`
          schema:
            type: string
          example: Bearer eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
      responses:
        "200":
          description: User claims retrieved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserInfoApiResponse"
              example:
                success: true
                message: Userinfo berhasil diambil
                data:
                  sub: 2986721c-0cc2-42ba-91f2-95c00ae7e8b9
                errors: null
                meta:
                  timestamp: "2026-07-03T09:19:00Z"
        "401":
          description: Authorization header missing/malformed, or access token invalid/expired
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Access token tidak valid atau sudah expired
                data: null
                errors:
                  code: UNAUTHORIZED
                  message: Access token tidak valid atau sudah expired
                  details: null
                meta:
                  timestamp: "2026-07-03T09:19:00Z"

  /api/v1/auth/introspect:
    post:
      tags: [Auth]
      summary: Introspect a token
      description: Wraps WSO2 IS `POST /oauth2/introspect` (RFC 7662), using client_secret_basic auth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/IntrospectRequest"
            example:
              token: eyJhbGciOiJSUzI1NiJ9.example-access-token-payload.example-signature
              tokenTypeHint: access_token
      responses:
        "200":
          description: Introspection result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/IntrospectApiResponse"
              example:
                success: true
                message: Introspeksi token berhasil
                data:
                  active: true
                  scope: internal_login openid
                  client_id: RnIGkMGt5DkeTZqOcL9_m5z2t_Qa
                  username: admin
                  exp: 1783070533
                errors: null
                meta:
                  timestamp: "2026-07-03T09:20:00Z"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestBindingErrorResponse"
              example:
                timestamp: "2026-07-03T08:12:46.458339700Z"
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/introspect
                method: POST
        "500":
          description: WSO2 IS rejected or was unreachable for the introspection call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: "2026-07-03T09:20:00Z"

  /api/v1/auth/revoke:
    post:
      tags: [Auth]
      summary: Revoke a token
      description: Wraps WSO2 IS `POST /oauth2/revoke` (RFC 7009), using client_secret_basic auth.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RevokeRequest"
            example:
              token: a962fcbf-b301-3948-a29f-22202bfb5923
              tokenTypeHint: refresh_token
      responses:
        "200":
          description: Token revoked
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyApiResponse"
              example:
                success: true
                message: Token berhasil dicabut
                data: null
                errors: null
                meta:
                  timestamp: "2026-07-03T09:21:00Z"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestBindingErrorResponse"
              example:
                timestamp: "2026-07-03T08:12:46.458339700Z"
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/revoke
                method: POST
        "500":
          description: WSO2 IS rejected or was unreachable for the revoke call
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: "2026-07-03T09:21:00Z"

  /api/v1/auth/logout:
    post:
      tags: [Auth]
      summary: End the user's session
      description: Wraps WSO2 IS `POST /oidc/logout` using `id_token_hint`.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LogoutRequest"
            example:
              idToken: eyJhbGciOiJSUzI1NiJ9.example-id-token-payload.example-signature
      responses:
        "200":
          description: Logout succeeded
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EmptyApiResponse"
              example:
                success: true
                message: Logout berhasil
                data: null
                errors: null
                meta:
                  timestamp: "2026-07-03T09:22:00Z"
        "400":
          description: Malformed request body
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RequestBindingErrorResponse"
              example:
                timestamp: "2026-07-03T08:12:46.458339700Z"
                status: 400
                reason: Bad Request
                message: "data binding failed: unrecognized token '...' at line: 1 column: 54"
                path: /api/v1/auth/logout
                method: POST
        "500":
          description: Unexpected failure talking to WSO2 IS
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApiErrorResponse"
              example:
                success: false
                message: Terjadi kesalahan pada server, silakan coba lagi nanti
                data: null
                errors:
                  code: INTERNAL_ERROR
                  message: Terjadi kesalahan pada server, silakan coba lagi nanti
                  details: null
                meta:
                  timestamp: "2026-07-03T09:22:00Z"

components:
  schemas:
    # ===== Requests =====
    LoginRequest:
      type: object
      required: [username, password]
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          format: password
          example: "!AdminSWA123#"

    TokenExchangeRequest:
      type: object
      required: [code]
      properties:
        code:
          type: string
          description: Authorization code returned by the WSO2 IS authenticate step

    RefreshRequest:
      type: object
      required: [refreshToken]
      properties:
        refreshToken:
          type: string

    IntrospectRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        tokenTypeHint:
          type: string
          enum: [access_token, refresh_token]
          nullable: true

    RevokeRequest:
      type: object
      required: [token]
      properties:
        token:
          type: string
        tokenTypeHint:
          type: string
          enum: [access_token, refresh_token]
          nullable: true

    LogoutRequest:
      type: object
      required: [idToken]
      properties:
        idToken:
          type: string
        accessToken:
          type: string
          description: >-
            The access token currently in use, if any. When provided, it is denylisted
            server-side so it's rejected immediately on the next request instead of
            staying valid until it naturally expires.

    # ===== Data payloads (the `data` field of ApiResponse) =====
    AuthInitAuthenticator:
      type: object
      properties:
        authenticatorId:
          type: string
        authenticator:
          type: string
          example: Username & Password
        idp:
          type: string
          example: LOCAL
        metadata:
          type: object
          additionalProperties: true
        requiredParams:
          type: array
          items:
            type: string

    InitResponse:
      type: object
      properties:
        flowId:
          type: string
        authenticators:
          type: array
          items:
            $ref: "#/components/schemas/AuthInitAuthenticator"

    LoginResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
          nullable: true
        idToken:
          type: string
          nullable: true
        tokenType:
          type: string
          example: Bearer
        expiresIn:
          type: integer
          example: 3600
        scope:
          type: string
          nullable: true
        user:
          type: object
          description: Decoded id_token claims (sub, org_id, ...)
          additionalProperties: true

    IntrospectResponse:
      type: object
      required: [active]
      properties:
        active:
          type: boolean
      additionalProperties: true
      description: >-
        `active` plus a variable set of claims returned by WSO2 (scope, username, exp,
        client_id, ...) depending on the token being inspected.

    # ===== Standard response envelope (see note/API-Response-Standard.md) =====
    ErrorDetail:
      type: object
      properties:
        code:
          type: string
          example: UNAUTHORIZED
        message:
          type: string
        details:
          nullable: true

    ResponseMeta:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time

    ApiErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        message:
          type: string
        data:
          nullable: true
          example: null
        errors:
          $ref: "#/components/schemas/ErrorDetail"
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    InitApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Flow autentikasi berhasil dimulai
        data:
          $ref: "#/components/schemas/InitResponse"
        errors:
          nullable: true
          example: null
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    LoginApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Login berhasil
        data:
          $ref: "#/components/schemas/LoginResponse"
        errors:
          nullable: true
          example: null
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    UserInfoApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Userinfo berhasil diambil
        data:
          type: object
          description: OIDC userinfo claims (contents vary by requested scope)
          additionalProperties: true
        errors:
          nullable: true
          example: null
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    IntrospectApiResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Introspeksi token berhasil
        data:
          $ref: "#/components/schemas/IntrospectResponse"
        errors:
          nullable: true
          example: null
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    EmptyApiResponse:
      type: object
      description: Used by endpoints that succeed with no payload (revoke, logout).
      properties:
        success:
          type: boolean
          example: true
        message:
          type: string
          example: Logout berhasil
        data:
          nullable: true
          example: null
        errors:
          nullable: true
          example: null
        meta:
          $ref: "#/components/schemas/ResponseMeta"

    # Ballerina's own default HTTP error body, returned when @http:Payload binding fails
    # before the request even reaches our handler (e.g. malformed JSON, wrong Content-Type).
    RequestBindingErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
        status:
          type: integer
          example: 400
        reason:
          type: string
          example: Bad Request
        message:
          type: string
          example: "data binding failed: unrecognized token ..."
        path:
          type: string
          example: /api/v1/auth/login
        method:
          type: string
          example: POST
